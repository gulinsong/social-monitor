<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Social Media Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .platform-weibo { --color: #e6162d; }
        .platform-wechat { --color: #07c160; }
        .platform-maimai { --color: #f5a623; }
        .platform-xiaohongshu { --color: #ff2442; }
        .badge-platform { font-size: 0.75rem; }
        .sentiment-positive { color: #28a745; }
        .sentiment-negative { color: #dc3545; }
        .sentiment-neutral { color: #6c757d; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Social Media Monitor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login-manage">Login Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/schedule">Schedule Config</a></li>
                    <li class="nav-item"><a class="nav-link" href="/data">Data Browser</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analysis">Sentiment Analysis</a></li>
                </ul>
                <span class="navbar-text"><form action="/logout" method="POST" style="display:inline"><button type="submit" class="btn btn-link text-light nav-logout">Logout</button></form></span>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
