{% extends "base.html" %}
{% block title %}舆情分析{% endblock %}
{% block content %}
<h4>舆情分析</h4>

<div class="row mb-4">
  <div class="col-md-12">
    <button class="btn btn-primary" onclick="runAnalysis()">对未分析数据执行分析</button>
    <span id="analysis-result" class="ms-2 text-muted"></span>
  </div>
</div>

<h5>情感分布</h5>
<div class="row mb-4">
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <canvas id="sentiment-chart" height="200"></canvas>
    </div></div>
  </div>
  <div class="col-md-8">
    <div class="card"><div class="card-body">
      <h6>各平台情感分布</h6>
      <div id="platform-sentiment"></div>
    </div></div>
  </div>
</div>

<h5>高频关键词 Top 30</h5>
<div class="row mb-4">
  <div class="col-md-12">
    <div id="keywords-cloud" class="d-flex flex-wrap gap-2"></div>
  </div>
</div>

<h5>每日趋势（近7天）</h5>
<div class="row mb-4">
  <div class="col-md-8">
    <table class="table table-sm table-striped">
      <thead><tr><th>日期</th><th>总数</th><th>正面</th><th>负面</th><th>中性</th></tr></thead>
      <tbody id="daily-trend"></tbody>
    </table>
  </div>
</div>

<script>
async function loadAnalysis() {
    const resp = await fetch('/api/analysis/summary');
    const data = await resp.json();

    // 情感分布
    const sc = document.getElementById('sentiment-chart').getContext('2d');
    const sentColors = {positive:'#28a745', negative:'#dc3545', neutral:'#6c757d', '未分析':'#adb5bd'};
    const total = data.sentiment_distribution.reduce((a,b) => a + b.count, 0);
    document.getElementById('sentiment-chart').replaceWith(
        ...data.sentiment_distribution.map(s => {
            const pct = total > 0 ? (s.count/total*100).toFixed(1) : 0;
            return Object.assign(document.createElement('div'), {
                className: 'mb-2',
                innerHTML: `<span class="badge" style="background:${sentColors[s.label]||'#6c757d'}">${s.label}</span>
                    <span class="ms-2">${s.count} 条 (${pct}%)</span>
                    <div class="progress mt-1" style="height:6px"><div class="progress-bar" style="width:${pct}%;background:${sentColors[s.label]||'#6c757d'}"></div></div>`
            });
        })
    );

    // 各平台情感
    const ps = document.getElementById('platform-sentiment');
    const platforms = [...new Set(data.platform_sentiment.map(p => p.platform))];
    ps.innerHTML = '<table class="table table-sm"><thead><tr><th>平台</th><th>正面</th><th>负面</th><th>中性</th></tr></thead><tbody>' +
        platforms.map(plat => {
            const rows = data.platform_sentiment.filter(p => p.platform === plat);
            const pos = rows.find(r => r.sentiment==='positive')?.count || 0;
            const neg = rows.find(r => r.sentiment==='negative')?.count || 0;
            const neu = rows.find(r => r.sentiment==='neutral')?.count || 0;
            return `<tr><td>${plat}</td><td class="text-success">${pos}</td><td class="text-danger">${neg}</td><td class="text-secondary">${neu}</td></tr>`;
        }).join('') + '</tbody></table>';

    // 关键词
    const kw = document.getElementById('keywords-cloud');
    const maxCount = data.top_keywords.length > 0 ? data.top_keywords[0].count : 1;
    kw.innerHTML = data.top_keywords.map(k => {
        const size = Math.max(12, Math.round(k.count / maxCount * 28));
        return `<span class="badge bg-light text-dark" style="font-size:${size}px">${k.word} <small>(${k.count})</small></span>`;
    }).join('');

    // 每日趋势
    const dt = document.getElementById('daily-trend');
    dt.innerHTML = data.daily_trend.map(d =>
        `<tr><td>${d.day}</td><td>${d.total}</td><td class="text-success">${d.positive}</td><td class="text-danger">${d.negative}</td><td class="text-secondary">${d.neutral}</td></tr>`
    ).join('') || '<tr><td colspan="5" class="text-muted">暂无数据</td></tr>';
}

async function runAnalysis() {
    document.getElementById('analysis-result').textContent = '分析中...';
    const resp = await fetch('/api/analysis/run', {method: 'POST'});
    const data = await resp.json();
    document.getElementById('analysis-result').textContent = `完成，分析了 ${data.analyzed} 条`;
    loadAnalysis();
}

loadAnalysis();
</script>
{% endblock %}
