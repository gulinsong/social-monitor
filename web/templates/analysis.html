{% extends "base.html" %}
{% block title %}Sentiment Analysis{% endblock %}
{% block content %}
<h4>Sentiment Analysis</h4>

<div class="row mb-4">
  <div class="col-md-12">
    <button class="btn btn-primary" onclick="runAnalysis()">Analyze Unanalyzed Data</button>
    <span id="analysis-result" class="ms-2 text-muted"></span>
  </div>
</div>

<h5>Sentiment Distribution</h5>
<div class="row mb-4">
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <canvas id="sentiment-chart" height="200"></canvas>
    </div></div>
  </div>
  <div class="col-md-8">
    <div class="card"><div class="card-body">
      <h6>Sentiment by Platform</h6>
      <div id="platform-sentiment"></div>
    </div></div>
  </div>
</div>

<h5>Top Keywords (Top 30)</h5>
<div class="row mb-4">
  <div class="col-md-12">
    <div id="keywords-cloud" class="d-flex flex-wrap gap-2"></div>
  </div>
</div>

<h5>Daily Trend (Last 7 Days)</h5>
<div class="row mb-4">
  <div class="col-md-8">
    <table class="table table-sm table-striped">
      <thead><tr><th>Date</th><th>Total</th><th>Positive</th><th>Negative</th><th>Neutral</th></tr></thead>
      <tbody id="daily-trend"></tbody>
    </table>
  </div>
</div>

<script>
function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadAnalysis() {
    const resp = await fetch('/api/analysis/summary');
    const data = await resp.json();

    // Sentiment distribution
    const sc = document.getElementById('sentiment-chart').getContext('2d');
    const sentColors = {positive:'#28a745', negative:'#dc3545', neutral:'#6c757d', 'Not Analyzed':'#adb5bd'};
    const total = data.sentiment_distribution.reduce((a,b) => a + b.count, 0);
    document.getElementById('sentiment-chart').replaceWith(
        ...data.sentiment_distribution.map(s => {
            const pct = total > 0 ? (s.count/total*100).toFixed(1) : 0;
            return Object.assign(document.createElement('div'), {
                className: 'mb-2',
                innerHTML: `<span class="badge" style="background:${sentColors[s.label]||'#6c757d'}">${escHtml(s.label)}</span>
                    <span class="ms-2">${s.count} records (${pct}%)</span>
                    <div class="progress mt-1" style="height:6px"><div class="progress-bar" style="width:${pct}%;background:${sentColors[s.label]||'#6c757d'}"></div></div>`
            });
        })
    );

    // Sentiment by platform
    const ps = document.getElementById('platform-sentiment');
    const platforms = [...new Set(data.platform_sentiment.map(p => p.platform))];
    ps.innerHTML = '<table class="table table-sm"><thead><tr><th>Platform</th><th>Positive</th><th>Negative</th><th>Neutral</th></tr></thead><tbody>' +
        platforms.map(plat => {
            const rows = data.platform_sentiment.filter(p => p.platform === plat);
            const pos = rows.find(r => r.sentiment==='positive')?.count || 0;
            const neg = rows.find(r => r.sentiment==='negative')?.count || 0;
            const neu = rows.find(r => r.sentiment==='neutral')?.count || 0;
            return `<tr><td>${escHtml(plat)}</td><td class="text-success">${pos}</td><td class="text-danger">${neg}</td><td class="text-secondary">${neu}</td></tr>`;
        }).join('') + '</tbody></table>';

    // Keywords
    const kw = document.getElementById('keywords-cloud');
    const maxCount = data.top_keywords.length > 0 ? data.top_keywords[0].count : 1;
    kw.innerHTML = data.top_keywords.map(k => {
        const size = Math.max(12, Math.round(k.count / maxCount * 28));
        return `<span class="badge bg-light text-dark" style="font-size:${size}px">${escHtml(k.word)} <small>(${k.count})</small></span>`;
    }).join('');

    // Daily trend
    const dt = document.getElementById('daily-trend');
    dt.innerHTML = data.daily_trend.map(d =>
        `<tr><td>${escHtml(d.day)}</td><td>${d.total}</td><td class="text-success">${d.positive}</td><td class="text-danger">${d.negative}</td><td class="text-secondary">${d.neutral}</td></tr>`
    ).join('') || '<tr><td colspan="5" class="text-muted">No data</td></tr>';
}

async function runAnalysis() {
    document.getElementById('analysis-result').textContent = 'Analyzing...';
    const resp = await fetch('/api/analysis/run', {method: 'POST'});
    const data = await resp.json();
    document.getElementById('analysis-result').textContent = `Done, analyzed ${data.analyzed} records`;
    loadAnalysis();
}

loadAnalysis();
</script>
{% endblock %}
