{% extends "base.html" %}
{% block title %}调度配置{% endblock %}
{% block content %}
<h4>调度配置</h4>
<div id="config-cards"></div>

<h5 class="mt-4">全局关键词</h5>
<div class="row mb-3">
  <div class="col-md-6">
    <div class="input-group">
      <input type="text" id="global-keywords" class="form-control" placeholder="关键词，用逗号分隔">
      <button class="btn btn-primary" onclick="saveGlobalKeywords()">保存</button>
    </div>
  </div>
</div>

<h5 class="mt-4">飞书推送配置</h5>
<div class="row mb-3">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>Webhook推送</strong>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="feishu-enabled"
                 onchange="saveFeishu()">
        </div>
      </div>
      <div class="card-body">
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">Webhook URL</label>
          <div class="col-sm-9">
            <input type="text" class="form-control form-control-sm" id="feishu-webhook-url"
                   placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxx">
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">签名密钥</label>
          <div class="col-sm-9">
            <input type="password" class="form-control form-control-sm" id="feishu-sign-secret"
                   placeholder="可选签名密钥">
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">每次最大推送数</label>
          <div class="col-sm-3">
            <input type="number" class="form-control form-control-sm" id="feishu-max-push"
                   value="50" min="1" max="200">
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12 text-end">
            <button class="btn btn-sm btn-primary" onclick="saveFeishu()">保存Webhook</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row mb-3">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>Bitable (多维表格)</strong>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="bitable-enabled"
                 onchange="saveBitable()">
        </div>
      </div>
      <div class="card-body">
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">App ID</label>
          <div class="col-sm-9">
            <input type="text" class="form-control form-control-sm" id="bitable-app-id"
                   placeholder="飞书应用ID">
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">应用密钥</label>
          <div class="col-sm-9">
            <input type="password" class="form-control form-control-sm" id="bitable-app-secret"
                   placeholder="飞书应用密钥">
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">App Token</label>
          <div class="col-sm-9">
            <input type="text" class="form-control form-control-sm" id="bitable-app-token"
                   placeholder="从多维表格URL获取: /base/{app_token}">
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-3 col-form-label">Table ID</label>
          <div class="col-sm-9">
            <input type="text" class="form-control form-control-sm" id="bitable-table-id"
                   placeholder="数据表ID">
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12 text-end">
            <button class="btn btn-sm btn-primary" onclick="saveBitable()">保存多维表格配置</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PLATFORM_NAMES = {weibo:'微博', wechat:'微信', maimai:'脉脉', xiaohongshu:'小红书'};

async function loadConfig() {
    const resp = await fetch('/api/config/platforms');
    const data = await resp.json();
    const el = document.getElementById('config-cards');
    el.innerHTML = '<div class="row">' + Object.entries(data).map(([name, cfg]) => `
    <div class="col-md-6 mb-3">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>${PLATFORM_NAMES[name] || name}</strong>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enabled-${name}"
                   ${cfg.enabled?'checked':''} onchange="togglePlatform('${name}', this.checked)">
          </div>
        </div>
        <div class="card-body">
          <div class="row mb-2">
            <label class="col-sm-4 col-form-label">抓取间隔 (小时)</label>
            <div class="col-sm-4">
              <input type="number" class="form-control form-control-sm" id="interval-${name}"
                     value="${cfg.interval_hours}" min="1" max="48">
            </div>
            <div class="col-sm-4">
              <button class="btn btn-sm btn-outline-primary" onclick="saveInterval('${name}')">保存</button>
            </div>
          </div>
          <div class="row mb-2">
            <label class="col-sm-4 col-form-label">关键词</label>
            <div class="col-sm-8">
              <input type="text" class="form-control form-control-sm" id="keywords-${name}"
                     value="${cfg.keywords.join(',')}">
            </div>
          </div>
          <div class="row mb-2">
            <label class="col-sm-4 col-form-label">请求延迟范围 (秒)</label>
            <div class="col-sm-4">
              <input type="number" class="form-control form-control-sm" id="delay-min-${name}"
                     value="${cfg.request_delay.min}" step="0.5" min="1">
            </div>
            <div class="col-sm-4">
              <input type="number" class="form-control form-control-sm" id="delay-max-${name}"
                     value="${cfg.request_delay.max}" step="0.5" min="1">
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 text-end">
              <button class="btn btn-sm btn-primary" onclick="savePlatform('${name}')">全部保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>`).join('') + '</div>';

    // Load global keywords
    const kwResp = await fetch('/api/config/keywords');
    const kwData = await kwResp.json();
    document.getElementById('global-keywords').value = kwData.keywords.join(',');

    // Load feishu config
    const fsResp = await fetch('/api/config/feishu');
    const fsData = await fsResp.json();
    document.getElementById('feishu-enabled').checked = !!fsData.enabled;
    document.getElementById('feishu-webhook-url').value = fsData.webhook_url || '';
    document.getElementById('feishu-sign-secret').value = '';
    document.getElementById('feishu-max-push').value = fsData.max_push_per_run || 50;

    const bitable = fsData.bitable || {};
    document.getElementById('bitable-enabled').checked = !!bitable.enabled;
    document.getElementById('bitable-app-id').value = bitable.app_id || '';
    document.getElementById('bitable-app-secret').value = '';
    document.getElementById('bitable-app-token').value = bitable.app_token || '';
    document.getElementById('bitable-table-id').value = bitable.table_id || '';
}

async function togglePlatform(name, enabled) {
    await fetch(`/api/config/platforms/${name}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled})
    });
}

async function saveInterval(name) {
    const interval = parseFloat(document.getElementById(`interval-${name}`).value);
    await fetch(`/api/config/platforms/${name}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({interval_hours: interval})
    });
    alert('已保存');
}

async function savePlatform(name) {
    const keywords = document.getElementById(`keywords-${name}`).value.split(',').map(s=>s.trim()).filter(Boolean);
    const min = parseFloat(document.getElementById(`delay-min-${name}`).value);
    const max = parseFloat(document.getElementById(`delay-max-${name}`).value);
    await fetch(`/api/config/platforms/${name}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keywords, request_delay: {min, max}})
    });
    alert('已保存');
}

async function saveGlobalKeywords() {
    const keywords = document.getElementById('global-keywords').value.split(',').map(s=>s.trim()).filter(Boolean);
    await fetch('/api/config/keywords', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keywords})
    });
    alert('已保存');
}

async function saveFeishu() {
    const data = {
        enabled: document.getElementById('feishu-enabled').checked,
        webhook_url: document.getElementById('feishu-webhook-url').value,
        max_push_per_run: parseInt(document.getElementById('feishu-max-push').value) || 50,
    };
    const secret = document.getElementById('feishu-sign-secret').value;
    if (secret) data.sign_secret = secret;
    await fetch('/api/config/feishu', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    alert('已保存');
}

async function saveBitable() {
    const data = {
        bitable: {
            enabled: document.getElementById('bitable-enabled').checked,
            app_id: document.getElementById('bitable-app-id').value,
            app_token: document.getElementById('bitable-app-token').value,
            table_id: document.getElementById('bitable-table-id').value,
        }
    };
    const secret = document.getElementById('bitable-app-secret').value;
    if (secret) data.bitable.app_secret = secret;
    await fetch('/api/config/feishu', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    alert('已保存');
}

loadConfig();
</script>
{% endblock %}
