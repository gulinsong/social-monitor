<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 社媒监控</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; overflow: hidden; }
        .login-header { background: #343a40; color: #fff; padding: 20px; text-align: center; }
        .login-header h5 { margin: 0; }
        .login-body { padding: 24px; }
        .login-body label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        .login-body input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
        .login-body input:focus { outline: none; border-color: #4dabf7; box-shadow: 0 0 0 2px rgba(77,171,247,0.2); }
        .login-btn { width: 100%; padding: 10px; background: #0d6efd; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .login-btn:hover { background: #0b5ed7; }
        .login-btn:disabled { background: #6c757d; cursor: not-allowed; }
        .alert { padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; font-size: 14px; }
        .alert-danger { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        #login-error { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header"><h5>社媒监控系统</h5></div>
        <div class="login-body">
            <div id="login-error" class="alert alert-danger"></div>
            <label for="login-password">密码</label>
            <input type="password" id="login-password" autofocus
                   onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin();}">
            <button id="login-btn" class="login-btn" onclick="doLogin()">登录</button>
        </div>
    </div>
    <script>
    function doLogin() {
        var pwd = document.getElementById('login-password').value;
        var btn = document.getElementById('login-btn');
        var errEl = document.getElementById('login-error');
        if (!pwd) {
            errEl.textContent = '请输入密码';
            errEl.style.display = 'block';
            return;
        }
        btn.disabled = true;
        btn.textContent = '登录中...';
        errEl.style.display = 'none';

        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/login', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.onload = function() {
            if (xhr.status === 200) {
                // 200 = 返回了登录页 = 密码错误
                errEl.textContent = '密码错误';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登录';
            } else if (xhr.status === 303 || xhr.status === 302) {
                window.location.href = '/';
            }
        };
        xhr.onerror = function() {
            errEl.textContent = '网络错误';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登录';
        };
        xhr.onreadystatechange = function() {
            // XMLHttpRequest 自动跟随重定向，所以成功登录后会拿到 / 的 200
            if (xhr.readyState === 4) {
                if (xhr.status === 200 && xhr.responseURL && xhr.responseURL.endsWith('/')) {
                    // 被重定向到了首页 = 登录成功
                    window.location.href = '/';
                }
            }
        };
        xhr.send('password=' + encodeURIComponent(pwd));
    }
    </script>
</body>
</html>
